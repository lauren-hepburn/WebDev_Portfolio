<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kanban Board</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="container">
      <h1>Kanban Board</h1>
      <div class="board">
        <div class="list" id="list1">
          <h2>To Do</h2>
          <div class="card" id="card1" draggable="true">Wash Dishes</div>
          <div class="card" id="card2" draggable="true">Buy Groceries</div>
          <div class="card" id="card3" draggable="true">Dog Walk</div>
        </div>
        <div class="list" id="list2">
            <h2>In Progress</h2>
        </div>
        <div class="list" id="list3">
            <h2>Done</h2>
            <div class="card" id="card1" draggable="true">10k Steps</div
        </div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
